# ──────────────────────────────────────────────────────────────────────────────
# FILE LOCATION IN GITHUB REPO: .github/workflows/container-deploy.yml
# ──────────────────────────────────────────────────────────────────────────────
#
# Build once → push to ghcr.io → deploy in parallel to all 4 CSPs:
#   AWS       → Lambda (Express.js zip, no Docker)
#   Azure     → App Service       (ghcr.io public image)
#   GCP       → Cloud Run         (Artifact Registry)
#   OCI       → Ampere A1 VM      (ghcr.io public image via SSH)
#
# Triggers:
#   • Push to main (when index.html, Dockerfile, or this workflow changes)
#   • Manual button in GitHub Actions → "Run workflow"
# ──────────────────────────────────────────────────────────────────────────────

name: Build and Deploy (Containers)

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'Dockerfile'
      - 'nginx-container.conf'
      - 'server.js'
      - 'package.json'
      - '.github/workflows/container-deploy.yml'
  workflow_dispatch:

# ── SECRETS REQUIRED ──────────────────────────────────────────────────────────
# AWS_ACCESS_KEY_ID          IAM user access key
# AWS_SECRET_ACCESS_KEY      IAM user secret key
# AWS_LAMBDA_FUNCTION_NAME   e.g. multicloud-partners-express
#
# AZURE_CREDENTIALS          JSON from: az ad sp create-for-rbac --sdk-auth
# AZURE_APP_NAME             e.g. multicloud-partners-container
#
# GCP_SERVICE_ACCOUNT        JSON key for service account with run.admin + artifactregistry.admin
# GCP_PROJECT_ID             e.g. multicloud-partners-abc123
#
# OCI_VM_IP                  (skipped — no A1 capacity; uncomment deploy-oci job when ready)
# OCI_VM_USER                opc  (Oracle Linux)  or  ubuntu  (Ubuntu image)
# OCI_SSH_PRIVATE_KEY        Private key matching the public key added at VM creation
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/multicloud-partners:latest
            ghcr.io/${{ github.repository_owner }}/multicloud-partners:${{ github.sha }}

  # ── 2. AWS — Lambda (Express.js) ────────────────────────────────────────────
  # No Docker needed. GitHub Actions zips server.js + node_modules + index.html
  # and uploads directly to Lambda. Lambda Function URL serves it over HTTPS.
  deploy-aws:
    name: Deploy → AWS Lambda (Express)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install production dependencies
        run: npm install --omit=dev

      - name: Package and deploy to Lambda
        run: |
          mkdir -p public
          cp index.html public/
          cp personas.html public/
          zip -r function.zip server.js package.json node_modules/ public/
          aws lambda update-function-code \
            --function-name "${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://function.zip

  # ── 3. AZURE — App Service for Containers ───────────────────────────────────
  deploy-azure:
    name: Deploy → Azure App Service
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update container image (pull from GHCR public)
        run: |
          az webapp config container set \
            --name "${{ secrets.AZURE_APP_NAME }}" \
            --resource-group multicloud-partners-rg \
            --docker-custom-image-name \
              ghcr.io/${{ github.repository_owner }}/multicloud-partners:latest

      - name: Restart to apply new image
        run: |
          az webapp restart \
            --name "${{ secrets.AZURE_APP_NAME }}" \
            --resource-group multicloud-partners-rg

  # ── 4. GCP — Cloud Run ──────────────────────────────────────────────────────
  deploy-gcp:
    name: Deploy → GCP Cloud Run
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (direct from GHCR)
        run: |
          gcloud run deploy multicloud-partners \
            --image ghcr.io/${{ github.repository_owner }}/multicloud-partners:latest \
            --platform managed \
            --region us-east4 \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --quiet

      - name: Grant public access (allUsers invoker)
        run: |
          gcloud run services add-iam-policy-binding multicloud-partners \
            --region us-east4 \
            --member="allUsers" \
            --role="roles/run.invoker"

  # ── 5. OCI — Ampere A1 VM (Docker via SSH) ──────────────────────────────────
  # SKIPPED: No A1.Flex capacity available in us-ashburn-1 (all ADs tried).
