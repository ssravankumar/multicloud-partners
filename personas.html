<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Entitlements by Persona | MultiCloud.Partners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0f1e; color: #e2e8f0; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #0a0f1e 0%, #111827 100%);
      border-bottom: 1px solid #1e293b;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header a { color: #60a5fa; text-decoration: none; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 1.1rem; }
    header a:hover { color: #93c5fd; }
    .back-link { font-size: 0.85rem; color: #94a3b8; text-decoration: none; }
    .back-link:hover { color: #e2e8f0; }

    .hero {
      text-align: center;
      padding: 3rem 2rem 2rem;
    }
    .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero h1 span { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: #94a3b8; font-size: 0.95rem; max-width: 560px; margin: 0 auto; }

    /* Persona selector */
    .persona-tabs {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem;
      padding: 1.5rem 2rem;
      max-width: 900px; margin: 0 auto;
    }
    .tab {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.2rem; border-radius: 2rem;
      border: 1px solid #1e293b; background: #111827;
      cursor: pointer; font-size: 0.85rem; font-weight: 500;
      transition: all 0.2s;
      color: #94a3b8;
    }
    .tab:hover { border-color: #3b82f6; color: #e2e8f0; }
    .tab.active { border-color: #3b82f6; background: #1e3a5f; color: #60a5fa; }
    .tab .avatar { font-size: 1.1rem; }

    /* Main grid */
    .content { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem; }

    .persona-header {
      display: flex; align-items: flex-start; gap: 1rem;
      background: #111827; border: 1px solid #1e293b; border-radius: 12px;
      padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
    }
    .persona-avatar { font-size: 2.5rem; line-height: 1; }
    .persona-info h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 600; }
    .persona-info .role { color: #94a3b8; font-size: 0.85rem; margin-top: 0.2rem; }
    .persona-info .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
    .tag { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 1rem; background: #1e293b; color: #94a3b8; }
    .tag.warn { background: #451a03; color: #fb923c; }
    .tag.ok { background: #052e16; color: #4ade80; }

    /* Cloud grid */
    .cloud-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }

    .cloud-card {
      background: #111827; border: 1px solid #1e293b; border-radius: 12px;
      overflow: hidden;
    }
    .cloud-card-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 1rem;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 600;
      border-bottom: 1px solid #1e293b;
    }
    .cloud-icon { font-size: 1.2rem; }
    .cloud-card-header .access-badge {
      margin-left: auto; font-size: 0.7rem; padding: 0.15rem 0.5rem;
      border-radius: 1rem; font-weight: 600;
    }
    .access-full { background: #052e16; color: #4ade80; }
    .access-read { background: #1e1b4b; color: #a78bfa; }
    .access-limited { background: #451a03; color: #fb923c; }
    .access-none { background: #1f1f1f; color: #6b7280; }

    .service-list { padding: 0.75rem 1rem; list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
    .service-list li { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
    .service-list li .dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-green { background: #4ade80; }
    .dot-yellow { background: #facc15; }
    .dot-red { background: #f87171; }
    .dot-gray { background: #4b5563; }

    .mfa-notice {
      margin-top: 0.75rem; padding: 0.6rem 1rem;
      background: #1e293b; border-top: 1px solid #1e293b;
      font-size: 0.75rem; color: #94a3b8;
      display: flex; align-items: center; gap: 0.4rem;
    }

    /* Legend */
    .legend {
      display: flex; gap: 1.25rem; flex-wrap: wrap;
      padding: 1rem 0 1.5rem; font-size: 0.78rem; color: #94a3b8;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  </style>
</head>
<body>

<header>
  <a href="/">MultiCloud.Partners</a>
  <a href="/" class="back-link">← Back to home</a>
</header>

<div class="hero">
  <h1>Cloud Entitlements <span>by Persona</span></h1>
  <p>Simulated IAM entitlements across AWS, Azure, GCP, and Oracle Cloud — showing how access varies by role and compliance boundary.</p>
</div>

<div class="persona-tabs" id="tabs"></div>

<div class="content">
  <div class="legend">
    <div class="legend-item"><span class="dot dot-green" style="width:9px;height:9px;border-radius:50%;display:inline-block"></span> Full access</div>
    <div class="legend-item"><span class="dot dot-yellow" style="width:9px;height:9px;border-radius:50%;display:inline-block"></span> Read-only</div>
    <div class="legend-item"><span class="dot dot-red" style="width:9px;height:9px;border-radius:50%;display:inline-block"></span> Restricted</div>
    <div class="legend-item"><span class="dot dot-gray" style="width:9px;height:9px;border-radius:50%;display:inline-block"></span> No access</div>
  </div>
  <div id="persona-header"></div>
  <div class="cloud-grid" id="cloud-grid"></div>
</div>

        name: "Oracle Cloud", icon: "🔴", accessLabel: "Read Only", accessCls: "access-read",

  {

        services: [
          { dot: "green",  text: "S3 — read/write data-lake buckets" },

function renderPersona(p) {
  // Header
  document.getElementById("persona-header").innerHTML = `
    <div class="persona-header">
      <div class="persona-avatar">${p.avatar}</div>
      <div class="persona-info">
        <h2>${p.title}</h2>
        <div class="role">${p.role}</div>
        <div class="tags">${p.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join("")}</div>
      </div>
    </div>
  `;

  // Cloud cards
  document.getElementById("cloud-grid").innerHTML = p.clouds.map(c => `
    <div class="cloud-card">
      <div class="cloud-card-header">
        <span class="cloud-icon">${c.icon}</span>
        ${c.name}
        <span class="access-badge ${c.accessCls}">${c.accessLabel}</span>
      </div>
      <ul class="service-list">
        ${c.services.map(s => `
          <li><span class="dot dot-${s.dot}"></span>${s.text}</li>
        `).join("")}
      </ul>
      <div class="mfa-notice">🔐 ${c.mfa}</div>
    </div>
  `).join("");
}

function renderTabs(activeId) {
  document.getElementById("tabs").innerHTML = PERSONAS.map(p => `
    <button class="tab ${p.id === activeId ? 'active' : ''}" onclick="selectPersona('${p.id}')">
      <span class="avatar">${p.avatar}</span> ${p.label}
    </button>
  `).join("");
}

function selectPersona(id) {
  const p = PERSONAS.find(x => x.id === id);
  renderTabs(id);
  renderPersona(p);
}

// Init
selectPersona("developer");
</script>
</body>
</html>
